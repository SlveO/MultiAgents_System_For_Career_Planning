version: "3.9"

services:
  api:
    build: .
    container_name: career-assistant
    ports:
      - "8000:8000"
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      - BRAIN_DEFAULT_MODEL=${BRAIN_DEFAULT_MODEL:-deepseek-chat}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-me-in-production}
      - API_HOST=0.0.0.0
      - API_PORT=8000
    volumes:
      - ./data:/app/data
      - ./dataset:/app/dataset
    restart: unless-stopped
